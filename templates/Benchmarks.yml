name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill historical benchmark data"
        required: true
        default: "false"
  push:
    branches:
      - &benchmark_branch master
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: benchledger-pages
  cancel-in-progress: false

env:
  BENCHLEDGER_VERSION: "0.3.3"
  BENCH_PACKAGE_NAME: "YourPackageName.jl"
  BENCH_PACKAGE_DESCRIPTION: "Benchmark history for YourPackageName.jl"
  BENCH_PACKAGE_URL: "https://..."
  BENCH_BRANCH: *benchmark_branch

jobs:
  build-and-publish:
    if: github.event_name != 'workflow_dispatch' || inputs.backfill != 'true'
    name: Ubuntu 24.04 - x64
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check out Pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate benchmark project
        run: julia --project=benchmark -e 'using Pkg; Pkg.instantiate()'

      - name: Run benchmarks into benchmark database
        env:
          BENCH_DB_IN_CURRENT_BRANCH: false
          BENCH_DB_PATH: ${{ github.workspace }}/gh-pages/benchmarks/data/benchledger.sqlite
          # BENCH_DB_PATH: ${{ github.workspace }}/benchmark/benchledger.sqlite (if database is not in page deploy branch)
          BENCH_NOTES: "GitHub Actions BenchLedger run"
        run: |
          mkdir -p "$(dirname "$BENCH_DB_PATH")"
          julia --project=benchmark benchmark/runbench.jl

      - name: Checkpoint benchmark database
        env:
          BENCH_DB_PATH: ${{ github.workspace }}/gh-pages/benchmarks/data/benchledger.sqlite
          # BENCH_DB_PATH: ${{ github.workspace }}/benchmark/benchledger.sqlite (if database is not in page deploy branch)
        run: |
          julia --project=benchmark -e 'using SQLite; db = SQLite.DB(ENV["BENCH_DB_PATH"]); SQLite.execute(db, "PRAGMA wal_checkpoint(TRUNCATE)"); close(db)'
          rm -f "${BENCH_DB_PATH}-wal" "${BENCH_DB_PATH}-shm"

      - name: Download BenchLedger web release
        run: |
          url="https://github.com/abcdvvvv/BenchLedger/releases/download/v${BENCHLEDGER_VERSION}/BenchLedger-${BENCHLEDGER_VERSION}-dist.tar.gz"
          curl -fsSL "$url" -o /tmp/benchledger-dist.tar.gz
          rm -rf /tmp/benchledger-dist
          mkdir -p /tmp/benchledger-dist
          tar -xzf /tmp/benchledger-dist.tar.gz -C /tmp/benchledger-dist

      - name: Install BenchLedger viewer
        run: |
          mkdir -p gh-pages/benchmarks/data
          find gh-pages/benchmarks -mindepth 1 -maxdepth 1 ! -name data -exec rm -rf {} +
          cp -a /tmp/benchledger-dist/. gh-pages/benchmarks/

      # - name: Commit source database and copy to Pages tree
      #   run: |
      #     git config user.name "github-actions[bot]"
      #     git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      #     git add ${{ github.workspace }}/benchmark/benchledger.sqlite
      #     if git diff --cached --quiet; then
      #       echo "No benchmark database changes on source branch."
      #     else
      #       git commit -m "Update benchmark database [skip ci]"
      #       git push
      #     fi

      #     mkdir -p gh-pages/benchmarks/data
      #     cp "${{ github.workspace }}/benchmark/benchledger.sqlite" "${{ github.workspace }}/gh-pages/benchmarks/data/benchledger.sqlite"

      - name: Generate BenchLedger manifest
        run: |
          db="gh-pages/benchmarks/data/benchledger.sqlite"
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"
          sha256="$(sha256sum "$db" | cut -d' ' -f1)"
          size_bytes="$(stat -c '%s' "$db")"

          cat > gh-pages/benchmarks/benchledger.json <<EOF
          {
            "manifest_version": 1,
            "benchledger_web_version": "${BENCHLEDGER_VERSION}",
            "generated_at": "${generated_at}",
            "site": {
              "title": "${BENCH_PACKAGE_NAME} BenchLedger",
              "description": "${BENCH_PACKAGE_DESCRIPTION}"
            },
            "databases": [
              {
                "id": "${BENCH_PACKAGE_NAME}",
                "name": "${BENCH_PACKAGE_NAME}",
                "description": "${BENCH_PACKAGE_DESCRIPTION}",
                "url": "./data/benchledger.sqlite",
                "sha256": "${sha256}",
                "size_bytes": ${size_bytes},
                "packed_at": "${generated_at}",
                "schema_version": 3,
                "metadata_preview": {
                  "name": "${BENCH_PACKAGE_NAME}",
                  "project_url": "${BENCH_PACKAGE_URL}",
                  "logo_url": null
                }
              }
            ]
          }
          EOF

      - name: Publish BenchLedger page
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks

          if git diff --cached --quiet; then
            echo "No benchmarks page changes to publish."
          else
            git commit -m "Update BenchLedger benchmark page"
            git push origin HEAD:gh-pages
          fi

  backfill-benchmarks:
    if: github.event_name == 'workflow_dispatch' && inputs.backfill == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate benchmark project
        run: julia --project=benchmark -e 'using Pkg; Pkg.instantiate()'

      - name: Backfill historical benchmark database
        run: |
          set -euo pipefail

          REPO="$(git rev-parse --show-toplevel)"
          REPO_NAME="$(basename "$REPO")"

          PAGES_WT="/tmp/${REPO_NAME}-pages"
          HIST_WT="/tmp/${REPO_NAME}-history"
          DB="$PAGES_WT/benchmarks/data/benchledger.sqlite"

          # Pages branch worktree: stores the benchmark database.
          if ! git -C "$PAGES_WT" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            rm -rf "$PAGES_WT"
            git -C "$REPO" worktree add "$PAGES_WT" gh-pages
          fi

          # Historical source worktree: checked out to each old tag.
          rm -rf "$HIST_WT"
          git -C "$REPO" worktree add --detach "$HIST_WT" HEAD

          mkdir -p "$(dirname "$DB")"

          for tag in $(git -C "$REPO" tag --sort=v:refname); do
            echo "Backfilling benchmark for $tag"

            git -C "$HIST_WT" checkout --detach "$tag"

            commit="$(git -C "$HIST_WT" rev-parse HEAD)"
            date="$(git -C "$HIST_WT" show -s --format=%cI HEAD)"

            GITHUB_REF_TYPE=tag \
            GITHUB_REF_NAME="$tag" \
            GITHUB_SHA="$commit" \
            BENCH_DATE="$date" \
            BENCH_TARGET_PATH="$HIST_WT" \
            BENCH_DB_PATH="$DB" \
            BENCH_DB_IN_CURRENT_BRANCH=false \
            BENCH_NOTES="Backfilled with current benchmark suite against $tag" \
            julia --project="$REPO/benchmark" "$REPO/benchmark/runbench.jl"
          done

          git -C "$PAGES_WT" config user.name "github-actions[bot]"
          git -C "$PAGES_WT" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git -C "$PAGES_WT" add benchmarks/data/benchledger.sqlite
          if git -C "$PAGES_WT" diff --cached --quiet; then
            echo "No benchmark database changes."
          else
            git -C "$PAGES_WT" commit -m "Backfill benchmark database"
            git -C "$PAGES_WT" push origin HEAD:gh-pages
          fi

          git -C "$REPO" worktree remove "$HIST_WT"
